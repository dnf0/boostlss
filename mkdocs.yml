site_name: boostlss
site_description: An idiomatic Rust library for boosting GAMLSS with native Python bindings
repo_url: https://github.com/dnf0/boostlss

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Examples: examples.md
  - End-to-End Tutorials:
    - Spatial Bivariate Splines: examples/spatial_bivariate.md
    - Robust Student-T Regression: examples/robust_student_t.md
  - API Reference: api.md
  - Theory & Deep Dives:
    - Algorithms: theory/algorithms.md
    - Base Learners: theory/base_learners.md
    - Distribution Families: theory/families.md
